        const createIcon = (name) => {
            return ({ size = 24, color = "currentColor", className = "", ...props }) => {
                const iconData = window.lucide && (window.lucide.icons[name] || window.lucide[name]);
                if (!iconData) return null;

                const renderNode = (node, i) => {
                    const [tag, attrs, children] = node;
                    const reactAttrs = { key: i };
                    if (attrs) {
                        for (const [k, v] of Object.entries(attrs)) {
                            let reactKey = k.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                            if (k === 'class') reactKey = 'className';
                            reactAttrs[reactKey] = v;
                        }
                    }
                    return React.createElement(tag, reactAttrs, (children || []).map((child, j) => renderNode(child, j)));
                };

                const childrenNodes = (Array.isArray(iconData) && typeof iconData[0] === 'string')
                    ? (iconData[0] === 'svg' ? iconData[2] : [iconData]) : iconData;

                return React.createElement(
                    "svg",
                    {
                        xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
                        fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                        className: `lucide lucide-${name} ${className}`, ...props
                    },
                    (childrenNodes || []).map((child, i) => renderNode(child, i))
                );
            };
        };

            const maintenanceData = useMemo(() => {

            const schoolCalendarDays = useMemo(() => {
                const year = schoolViewDate.getFullYear(); const month = schoolViewDate.getMonth();
                const days = []; const daysInMonth = new Date(year, month + 1, 0).getDate(); const firstDay = new Date(year, month, 1).getDay();
                for (let i = 0; i < firstDay; i++) days.push({ day: null, fullDate: null });

            }, [schoolViewDate]);

            // 이음메시지 분석 로직 (AI 연동 - 비서 기능 포함)
            const handleAnalyzeIeum = async () => {
                if (!ieumMessage.trim()) return;
                setIsAnalyzing(true);
                try {
                    // 미리보기(캔버스) 환경에서는 키를 비워두어야 자체 내장 AI가 작동합니다.
                    // (★ 나중에 선생님의 깃허브에 실제로 올리실 때만 쌍따옴표 안에 발급받은 키를 넣어주세요!)
                    const apiKey = ""; 
                    
                    // 스키마 충돌 방지를 위해 프롬프트를 하나로 통합하고 명확한 JSON 구조를 요구합니다.
                    const promptText = `당신은 초등학교 교사를 돕는 스마트 비서입니다. 
다음 업무 메시지를 분석하여 반드시 유효한 JSON 형식으로만 응답하세요. 마크다운(\`\`\`json)은 빼고 순수 JSON 텍스트만 출력하세요. 
올해는 2026년입니다.

[JSON 구조]
{
  "isSchedule": true 또는 false (일정 포함 여부),
  "summary": "교사가 이해하기 쉽게 요약한 브리핑 (예: 선생님, 이 메시지는 ~안내입니다.)",
  "events": [
    {
      "date": "YYYY-MM-DD", 
      "title": "일정 또는 마감명", 
      "category": "deadline(마감일) 또는 field_trip(체험학습) 또는 lecture(연수/수업) 또는 general(일반)"
    }
  ]
}

메시지: ${ieumMessage}`;

                    const payload = {
                        contents: [{ parts: [{ text: promptText }] }],
                        generationConfig: { 
                            responseMimeType: "application/json"
                        }
                    };

                    let result = null;
                    let retries = 0;
                    const delays = [1000, 2000, 4000, 8000, 16000];

                    while (retries < 5) {
                        try {
                            // 캔버스 환경 전용 모델 통로로 변경했습니다.
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            
                            if (!response.ok) {
                                const errorData = await response.text();
                                throw new Error(`HTTP Error ${response.status}: ${errorData}`);
                            }
                            
                            result = await response.json();
                            break;
                        } catch (e) {
                            if (retries === 4) throw e;
                            await new Promise(res => setTimeout(res, delays[retries]));
                            retries++;
                        }
                    }

                    let text = result?.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (text) {
                        // AI가 혹시라도 마크다운(```json)을 붙여서 보낼 경우를 대비해 텍스트 정제
                        text = text.replace(/```json/gi, '').replace(/```/g, '').trim();
                        setAnalyzedResult(JSON.parse(text));
                    } else {
                        throw new Error("API 응답이 비어있습니다.");
                    }

                    console.error("분석 실패 상세 로그:", error);
                    alert("메시지 분석에 실패했습니다. 혹시 계속 안 되면 개발자 도구(F12) 콘솔 창의 에러 메시지를 확인해주세요.");
                } finally {
                    setIsAnalyzing(false);
                }
            };

                    } else {
                        alert("비밀번호가 일치하지 않습니다.");
                        setPinCode("");
                    }
                }
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6);
                        setUploadedImageBase64(compressedBase64);
                    };

                                        )}
                                        <div className="flex items-center gap-3">
                                            <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" id="photo-upload" ref={fileInputRef} />
                                            <label htmlFor="photo-upload" className="p-3 bg-rose-50 text-rose-500 rounded-2xl cursor-pointer hover:bg-rose-100 transition-colors flex shrink-0">
                                                <ImagePlus size={24}/>
                                            </label>
                                            <input type="text" value={newMemoryText} onChange={(e) => setNewMemoryText(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleAddMemory()} placeholder="오늘 시하에게 어떤 일이 있었나요?" className="flex-1 bg-white border border-stone-300 rounded-2xl px-5 py-3 text-sm outline-none focus:ring-2 focus:ring-rose-200 text-stone-800" />
                                            <button onClick={handleAddMemory} className="bg-stone-800 text-white px-6 py-3 rounded-2xl font-black hover:bg-stone-900 transition-colors shrink-0">저장</button>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {sihaMemories.map(m => (
                                            <div key={m.id} className="bg-paper-50 rounded-[2.5rem] overflow-hidden shadow-sm border border-stone-200 group hover:shadow-md transition-all duration-500">
                                                <div className="h-64 overflow-hidden relative bg-stone-200 border-b border-stone-200">
                                                    <img src={m.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                                    <div className="absolute top-6 left-6 bg-white/90 backdrop-blur px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm text-stone-700">{m.date}</div>
                                                </div>
                                                <div className="p-8">
                                                    <h3 className="text-xl font-black mb-3 text-stone-800">{m.title}</h3>
                                                    <p className="text-stone-600 text-sm leading-relaxed mb-6 line-clamp-3">{m.content}</p>
                                                    <div className="pt-6 border-t border-stone-200 flex justify-between items-center text-[10px] font-bold text-stone-400">
                                                        <span className="flex items-center gap-1 uppercase tracking-widest"><User size={12}/> Written by {m.author}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
