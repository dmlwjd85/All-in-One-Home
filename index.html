<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼봉패밀리 - 올인원 홈 포인트</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;400;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }

</head>
<body class="bg-slate-100 text-slate-800">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 1. 파이어베이스 모듈 임포트 (CDN 방식)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, serverTimestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // React Hooks
        const { useState, useEffect, useMemo } = React;

        // 🚨 파이어베이스 설정값 (선생님의 고유 키값 유지)
        const fallbackConfig = {
            apiKey: "AIzaSyAsih-sfnIZ_gX_1l7SAVZHCAhk3KzmiP8",
            authDomain: "sambong-world-2026.firebaseapp.com",
            projectId: "sambong-world-2026",
            storageBucket: "sambong-world-2026.firebasestorage.app",
            messagingSenderId: "",
            appId: "1:728320769100:web:7510c9a77cca6b87a788e9",
            measurementId: "G-H1RGMJHGTV"
        };

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : fallbackConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'home-note-app';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 2. Lucide 아이콘 렌더링 에러를 완벽하게 방지하는 컴포넌트 변환기
        const createIcon = (name) => {
            return ({ size = 24, color = "currentColor", className = "", ...props }) => {
                const iconData = window.lucide && (window.lucide.icons[name] || window.lucide[name]);
                if (!iconData) return null;

                const renderNode = (node, i) => {
                    const [tag, attrs, children] = node;
                    const reactAttrs = { key: i };
                    if (attrs) {
                        for (const [k, v] of Object.entries(attrs)) {
                            let reactKey = k.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                            if (k === 'class') reactKey = 'className';
                            reactAttrs[reactKey] = v;
                        }
                    }
                    return React.createElement(tag, reactAttrs, (children || []).map((child, j) => renderNode(child, j)));
                };

                const childrenNodes = (Array.isArray(iconData) && typeof iconData[0] === 'string')
                    ? (iconData[0] === 'svg' ? iconData[2] : [iconData]) : iconData;

                return React.createElement(
                    "svg",
                    {
                        xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
                        fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                        className: `lucide lucide-${name} ${className}`, ...props
                    },
                    (childrenNodes || []).map((child, i) => renderNode(child, i))
                );
            };
        };

        // 앱 전체에서 사용하는 모든 아이콘 매핑 (누락 방지)
        const Home = createIcon('Home');
        const CalendarIcon = createIcon('Calendar');
        const Wallet = createIcon('Wallet');
        const CheckSquare = createIcon('CheckSquare');
        const BookOpen = createIcon('BookOpen');
        const User = createIcon('User');
        const Heart = createIcon('Heart');
        const Bell = createIcon('Bell');
        const Plus = createIcon('Plus');
        const TrendingUp = createIcon('TrendingUp');
        const TrendingDown = createIcon('TrendingDown');
        const Droplets = createIcon('Droplets');
        const Activity = createIcon('Activity');
        const Scale = createIcon('Scale');
        const ChevronLeft = createIcon('ChevronLeft');
        const ChevronRight = createIcon('ChevronRight');
        const X = createIcon('X');
        const Trash2 = createIcon('Trash2');
        const Sparkles = createIcon('Sparkles');
        const ClipboardCheck = createIcon('ClipboardCheck');
        const Calculator = createIcon('Calculator');
        const Check = createIcon('Check');
        const Camera = createIcon('Camera');
        const ImageIcon = createIcon('Image');
        const Edit3 = createIcon('Edit3');
        const FileText = createIcon('FileText');
        const LinkIcon = createIcon('Link');
        const DollarSign = createIcon('DollarSign');

        // 정적 데이터 (아내분의 살림 루틴)
        const CHORE_MASTER_LIST = [
            { id: 1, task: "세탁조" }, { id: 2, task: "식세기-후드" }, { id: 3, task: "냉장고 1" }, 
            { id: 4, task: "전자레인지" }, { id: 5, task: "에프" }, { id: 6, task: "안방 변기" }, 
            { id: 7, task: "재활용 1" }, { id: 8, task: "침구 1" }, { id: 9, task: "쇼파 1" }, { id: 10, task: "집안 정비" },
            { id: 11, task: "버리기" }, { id: 12, task: "현관" }, { id: 13, task: "다이슨 1" }, 
            { id: 14, task: "재활용 2" }, { id: 15, task: "펜트리" }, { id: 16, task: "거실 변기" }, 
            { id: 17, task: "로이 청소" }, { id: 18, task: "침구 2" }, { id: 19, task: "냉장고 2" }, { id: 20, task: "집안 정비" },
            { id: 21, task: "재활용 3" }, { id: 22, task: "시하 책장" }, { id: 23, task: "카페트" }, 
            { id: 24, task: "쇼파 2" }, { id: 25, task: "유리창" }, { id: 26, task: "세면대" }, 
            { id: 27, task: "다이슨 2" }, { id: 28, task: "침구 3" }, { id: 29, task: "재활용 4" }, { id: 30, task: "집안 정비" }
        ];

        const App = () => {
            // State Management
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('home');
            const [currentUserMode, setCurrentUserMode] = useState('jaeyoon'); // jaeyoon or uijeong
            const [isMenuOpen, setIsMenuOpen] = useState(true);

            // Data States
            const [familyTasks, setFamilyTasks] = useState([]);
            const [sihaMemories, setSihaMemories] = useState([]);
            const [weightLogs, setWeightLogs] = useState([]);
            const [periodLogs, setPeriodLogs] = useState([]);
            const [calendarEvents, setCalendarEvents] = useState([]);
            const [monthlyChores, setMonthlyChores] = useState({});
            const [ledgerItems, setLedgerItems] = useState([]);
            
            // UI States
            const [newMemoryText, setNewMemoryText] = useState("");
            const [inputWeight, setInputWeight] = useState("");
            const [viewDate, setViewDate] = useState(new Date(2026, 2, 1)); 
            const [selectedDate, setSelectedDate] = useState(null);
            const [showEventModal, setShowEventModal] = useState(false);
            const [newEventTitle, setNewEventTitle] = useState("");
            
            // Ledger Edit States
            const [showLedgerAddModal, setShowLedgerAddModal] = useState(false);
            const [newLedgerItem, setNewLedgerItem] = useState({ category: 'income_reg', title: '', amount: 0 });
            const [editingLedgerId, setEditingLedgerId] = useState(null);
            const [editAmount, setEditAmount] = useState("");

            const todayDate = new Date().getDate();

            // Firebase Auth
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch (error) { console.error("Auth Error:", error); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Data Sync (Firestore)
            useEffect(() => {
                if (!user) return;

                const unsubTasks = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'familyTasks'), (snap) => {
                    setFamilyTasks(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubMemories = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'sihaMemories'), (snap) => {
                    setSihaMemories(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date)));
                });
                const unsubEvents = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'calendarEvents'), (snap) => {
                    setCalendarEvents(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                const unsubChores = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'monthlyChores'), (snap) => {
                    const choresMap = {};
                    snap.docs.forEach(doc => { choresMap[doc.id] = doc.data().done; });
                    setMonthlyChores(choresMap);
                });
                const unsubLedger = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'ledgerItems'), (snap) => {
                    const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (items.length === 0) {
                        initializeLedger();
                    } else {
                        setLedgerItems(items);
                    }
                });
                const unsubWeight = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'weightLogs'), (snap) => {
                    setWeightLogs(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(a.date) - new Date(b.date)));
                });
                const unsubPeriod = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'periodLogs'), (snap) => {
                    setPeriodLogs(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => new Date(b.date) - new Date(a.date)));
                });

                return () => { unsubTasks(); unsubMemories(); unsubEvents(); unsubChores(); unsubLedger(); unsubWeight(); unsubPeriod(); };
            }, [user]);

            const initializeLedger = async () => {
                const initialItems = [
                    { category: 'income_reg', title: '알뜰 재윤 월소득', amount: 320 },
                    { category: 'income_reg', title: '살뜰 의정 월소득', amount: 330 },
                    { category: 'income_irr', title: '알뜰 재윤 보너스', amount: 1300 },
                    { category: 'income_irr', title: '살뜰 의정 보너스', amount: 1419 },
                    { category: 'expense_non', title: '교직원 공제회', amount: 75 },
                    { category: 'expense_non', title: '하나손해보험', amount: 30 },
                    { category: 'expense_non', title: 'KCGI 시하', amount: 36 },
                    { category: 'expense_non', title: '적금 시하', amount: 15 },
                    { category: 'expense_non', title: '보장성 보험(자녀)', amount: 24 },
                    { category: 'expense_non', title: 'KCGI 연금저축', amount: 50 },
                    { category: 'expense_non', title: '미래에셋 IRP', amount: 25 },
                    { category: 'expense_fix', title: '대출이자', amount: 106 },
                    { category: 'expense_fix', title: '교통/통신비', amount: 25 },
                    { category: 'expense_fix', title: '관리비/공과금', amount: 33 },
                    { category: 'expense_fix', title: '주식비(장보기)', amount: 70 },
                    { category: 'expense_var', title: '문화생활비', amount: 9 },
                    { category: 'expense_var', title: '경조사비', amount: 5 }
                ];
                for (const item of initialItems) {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ledgerItems'), item);
                }
            };

            // 가계부 연산 로직
            const ledgerStats = useMemo(() => {
                const res = { incReg: 0, incIrr: 0, expNon: 0, expFix: 0, expVar: 0 };
                ledgerItems.forEach(item => {
                    if (item.category === 'income_reg') res.incReg += item.amount;
                    if (item.category === 'income_irr') res.incIrr += item.amount;
                    if (item.category === 'expense_non') res.expNon += item.amount;
                    if (item.category === 'expense_fix') res.expFix += item.amount;
                    if (item.category === 'expense_var') res.expVar += item.amount;
                });
                res.totalExp = res.expNon + res.expFix + res.expVar;
                res.irrMonthly = Math.round(res.incIrr / 12);
                res.netCashFlow = res.incReg - res.totalExp;
                return res;
            }, [ledgerItems]);

            // 공통 핸들러 함수들
            const handleUpdateAmount = async (id) => {
                if (!user) return;
                try {
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'ledgerItems', id);
                    await updateDoc(docRef, { amount: parseFloat(editAmount) || 0 });
                    setEditingLedgerId(null);
                } catch (err) { console.error(err); }
            };

            const handleAddLedger = async () => {
                if (!newLedgerItem.title || !user) return;
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'ledgerItems'), {
                        ...newLedgerItem, amount: parseFloat(newLedgerItem.amount) || 0, createdAt: serverTimestamp()
                    });
                    setNewLedgerItem({ category: 'income_reg', title: '', amount: 0 });
                    setShowLedgerAddModal(false);
                } catch (err) { console.error(err); }
            };

            const deleteLedgerItem = async (id) => {
                if (!user) return;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'ledgerItems', id)); } 
                catch (err) { console.error(err); }
            };

            const toggleMonthlyChore = async (day) => {
                if (!user) return;
                const currentStatus = monthlyChores[day] || false;
                try { await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'monthlyChores', day.toString()), { done: !currentStatus, updatedAt: serverTimestamp() }); } 
                catch (err) { console.error(err); }
            };

            const handleAddWeight = async () => { if (!inputWeight || !user) return; try { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'weightLogs'), { date: new Date().toISOString().split('T')[0], weight: parseFloat(inputWeight), createdAt: serverTimestamp() }); setInputWeight(""); } catch (err) { console.error(err); } };
            const handleAddPeriod = async () => { if (!user) return; try { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'periodLogs'), { startDate: new Date().toISOString().split('T')[0], createdAt: serverTimestamp() }); } catch (err) { console.error(err); } };
            const handleAddMemory = async () => { 
                if (!newMemoryText.trim() || !user) return; 
                const newEntry = { 
                    date: new Date().toISOString().split('T')[0], 
                    title: newMemoryText.substring(0, 15), 
                    content: newMemoryText, 
                    author: currentUserMode === 'jaeyoon' ? '알뜰 재윤' : '살뜰 의정', 
                    image: "https://images.unsplash.com/photo-1519331379826-f10be5486c6f?w=800&q=80", 
                    tags: ["일상"], 
                    createdAt: serverTimestamp() 
                }; 
                try { 
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'sihaMemories'), newEntry); 
                    setNewMemoryText(""); 
                } catch (err) { console.error(err); } 
            };
            const handleAddEvent = async () => { if (!newEventTitle.trim() || !selectedDate || !user) return; try { await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'calendarEvents'), { date: selectedDate, title: newEventTitle, type: 'general', author: currentUserMode === 'jaeyoon' ? '알뜰 재윤' : '살뜰 의정', createdAt: serverTimestamp() }); setNewEventTitle(""); setShowEventModal(false); } catch (err) { console.error(err); } };

            // 달력 배열 계산
            const calendarDays = useMemo(() => {
                const year = viewDate.getFullYear(); const month = viewDate.getMonth();
                const days = []; const daysInMonth = new Date(year, month + 1, 0).getDate(); const firstDay = new Date(year, month, 1).getDay();
                for (let i = 0; i < firstDay; i++) days.push({ day: null, fullDate: null });
                for (let i = 1; i <= daysInMonth; i++) days.push({ day: i, fullDate: `${year}-${String(month+1).padStart(2,'0')}-${String(i).padStart(2,'0')}` });
                return days;
            }, [viewDate]);

            // 메뉴 매핑 리스트
            const menuItems = [
                { id: 'home', icon: Home, label: '홈' },
                { id: 'calendar', icon: CalendarIcon, label: '공용 일정' },
                { id: 'chores', icon: ClipboardCheck, label: '살림/할 일' },
                { id: 'ledger', icon: Wallet, label: '가계부' },
                { id: 'teacher', icon: BookOpen, label: '교무수첩' },
                { id: 'personal', icon: User, label: '개인 공간' },
                { id: 'siha', icon: Heart, label: '시하 기록' },
            ];

            return (
                <div className="flex h-screen bg-slate-100 text-slate-800 overflow-hidden font-sans">
                    {/* 네비게이션 사이드바 (차분한 톤) */}
                    <nav className={`bg-slate-50 border-r border-slate-200 transition-all duration-300 ${isMenuOpen ? 'w-64' : 'w-20'} flex flex-col shrink-0 shadow-sm z-20`}>
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-slate-700 p-2 rounded-lg text-white"><Home size={24} /></div>
                            {isMenuOpen && <span className="font-bold text-xl tracking-tight text-slate-700">삼봉패밀리</span>}
                        </div>
                        <div className="flex-1 px-3 space-y-1 overflow-y-auto">
                            {menuItems.map((item) => (
                                <button key={item.id} onClick={() => setActiveTab(item.id)} className={`w-full flex items-center gap-3 px-3 py-3 rounded-xl transition-all ${activeTab === item.id ? 'bg-slate-200 text-slate-800 font-semibold shadow-sm' : 'text-slate-500 hover:bg-slate-200/50 hover:text-slate-700'}`}>
                                    <item.icon size={20} className={activeTab === item.id ? 'text-slate-700' : ''} />
                                    {isMenuOpen && <span>{item.label}</span>}
                                </button>
                            ))}
                        </div>
                        <div className="p-4 border-t border-slate-200">
                            <button onClick={() => setCurrentUserMode(prev => prev === 'jaeyoon' ? 'uijeong' : 'jaeyoon')} className="w-full flex items-center gap-3 p-3 bg-slate-100 rounded-xl hover:bg-slate-200 transition-colors border border-slate-200">
                                <div className="w-8 h-8 rounded-full bg-slate-300 flex items-center justify-center text-slate-700 font-bold">
                                    {currentUserMode === 'jaeyoon' ? 'J' : 'U'}
                                </div>
                                {isMenuOpen && (
                                    <div className="text-left">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Connect</p>
                                        <p className="text-sm font-semibold truncate text-slate-700">
                                            {currentUserMode === 'jaeyoon' ? '알뜰 재윤 (삼봉초)' : '살뜰 의정 (성연초)'}
                                        </p>
                                    </div>
                                )}
                            </button>
                        </div>
                    </nav>

                    {/* 메인 콘텐츠 구역 */}
                    <main className="flex-1 flex flex-col overflow-hidden bg-slate-100">
                        <header className="h-16 bg-slate-50 border-b border-slate-200 px-8 flex items-center justify-between shrink-0 shadow-sm z-10">
                            <h2 className="text-xl font-black text-slate-700 tracking-tight">{menuItems.find(i => i.id === activeTab)?.label}</h2>
                            <div className="flex items-center gap-4">
                                <button className="p-2 text-slate-400 hover:text-slate-600 relative"><Bell size={20} /></button>
                                <button onClick={() => activeTab === 'ledger' ? setShowLedgerAddModal(true) : {}} className="bg-slate-700 text-white px-4 py-2 rounded-xl font-bold hover:bg-slate-800 transition-all flex items-center gap-2 shadow-sm">
                                    <Plus size={18} /> <span>추가하기</span>
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8">
                            {/* 🏠 홈 탭 */}
                            {activeTab === 'home' && (
                                <div className="max-w-5xl mx-auto space-y-6">
                                    {/* 인사말 배너 톤다운 */}
                                    <section className="bg-gradient-to-br from-slate-600 to-slate-800 rounded-3xl p-8 text-white shadow-md relative overflow-hidden">
                                        <div className="absolute top-[-20px] right-[-20px] text-white opacity-5"><Calculator size={200}/></div>
                                        <h1 className="text-3xl font-black mb-2 tracking-tighter">안녕하세요, {currentUserMode === 'jaeyoon' ? '알뜰 재윤' : '살뜰 의정'} 선생님! 👋</h1>
                                        <p className="opacity-80 text-lg">오늘의 현금흐름 요약: <span className="font-bold underline decoration-slate-400 decoration-4">월 소득 {ledgerStats.incReg}만 원</span></p>
                                        <p className="mt-4 text-sm opacity-90 font-medium flex items-center gap-2">
                                           <ClipboardCheck size={16}/> 오늘의 살림: {CHORE_MASTER_LIST.find(c => c.id === todayDate)?.task}
                                        </p>
                                    </section>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="bg-slate-50 p-6 rounded-3xl shadow-sm border border-slate-200">
                                            <h3 className="font-bold flex items-center gap-2 mb-4 text-slate-700"><Wallet size={18} />가계부 현황</h3>
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-slate-500 text-sm">정기소득 대비 지출</span>
                                                <span className={`text-sm font-bold ${ledgerStats.netCashFlow < 0 ? 'text-rose-600' : 'text-emerald-600'}`}>{ledgerStats.netCashFlow}만 원</span>
                                            </div>
                                            <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden">
                                                <div className="bg-slate-600 h-full" style={{ width: `${Math.min(100, (ledgerStats.totalExp / ledgerStats.incReg) * 100)}%` }}></div>
                                            </div>

                                                    <div className="h-40 flex items-end gap-2 px-4 border-b border-slate-200">
                                                        {weightLogs.slice(-10).map((l, i) => (
                                                            <div key={i} className="flex-1 bg-emerald-100/50 rounded-t-lg relative group cursor-pointer hover:bg-emerald-200 transition-colors" style={{ height: `${(l.weight / 100) * 100}%` }}>
                                                                <div className="absolute top-[-25px] left-1/2 -translate-x-1/2 bg-slate-700 text-white text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 transition-opacity">{l.weight}kg</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                            <div className="space-y-6">
                                                <div className="bg-slate-50 p-8 rounded-3xl border border-rose-100 shadow-sm text-center">
                                                    <h3 className="text-rose-500 font-black mb-6 flex items-center justify-center gap-2"><Droplets/> 생리 주기 트래커</h3>
                                                    <p className="text-sm text-slate-500 mb-1">다음 예정일까지</p>
                                                    <p className="text-6xl font-black text-rose-400 mb-6">12<span className="text-lg">일</span></p>
                                                    <button onClick={handleAddPeriod} className="w-full py-4 bg-rose-400 text-white rounded-2xl font-black hover:bg-rose-500 transition-colors shadow-sm">오늘 기록하기</button>
                                                </div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-500 space-y-6 py-20 bg-slate-50 rounded-3xl border border-slate-200 shadow-sm">
                                            <User size={60} className="text-slate-300" />
                                            <div className="text-center"><h2 className="text-xl font-black text-slate-700 mb-2">재윤의 개인 공간</h2><p className="text-sm text-slate-500">개인 취미나 운동, 게임 관련 기록 공간으로 활용해 보세요.</p></div>
                                        </div>
                                    )}
                                </div>
                            )}

                            {/* ❤️ 시하 기록 탭 */}
                            {activeTab === 'siha' && (
                                <div className="max-w-5xl mx-auto space-y-6">
                                    <div className="flex items-center justify-between mb-2">
                                        <div><h1 className="text-2xl font-black flex items-center gap-2 tracking-tight text-slate-800"><Heart className="text-rose-400 fill-rose-400" />시하 성장 기록</h1><p className="text-slate-500 text-sm mt-1">7살 우리 딸 시하의 소중한 순간들을 기록하세요.</p></div>
                                    </div>
                                    <div className="bg-slate-50 p-6 rounded-3xl border border-slate-200 shadow-sm flex items-center gap-4">
                                        <div className="p-3 bg-rose-50 text-rose-400 rounded-2xl"><Camera size={24}/></div>
                                        <input type="text" value={newMemoryText} onChange={(e) => setNewMemoryText(e.target.value)} onKeyPress={(e) => e.key === 'Enter' && handleAddMemory()} placeholder="오늘 시하에게 어떤 일이 있었나요?" className="flex-1 bg-white border border-slate-300 rounded-2xl px-6 py-4 text-sm outline-none focus:ring-2 focus:ring-rose-200 text-slate-700" />
                                        <button onClick={handleAddMemory} className="bg-slate-700 text-white px-8 py-4 rounded-2xl font-black hover:bg-slate-800 transition-colors">저장</button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                        {sihaMemories.map(m => (
                                            <div key={m.id} className="bg-slate-50 rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-200 group hover:shadow-md transition-all duration-500">
                                                <div className="h-64 overflow-hidden relative bg-slate-200">
                                                    <img src={m.image} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                                    <div className="absolute top-6 left-6 bg-white/90 backdrop-blur px-4 py-1.5 rounded-full text-[10px] font-black shadow-sm text-slate-700">{m.date}</div>
                                                </div>
                                                <div className="p-8">
                                                    <h3 className="text-xl font-black mb-3 text-slate-800">{m.title}</h3>
                                                    <p className="text-slate-600 text-sm leading-relaxed mb-6 line-clamp-3">{m.content}</p>
                                                    <div className="pt-6 border-t border-slate-200 flex justify-between items-center text-[10px] font-bold text-slate-400">
                                                        <span className="flex items-center gap-1 uppercase tracking-widest"><User size={12}/> Written by {m.author}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
