        // 2. Lucide 아이콘 렌더링 에러를 방지하는 헬퍼 함수
        const createIcon = (name) => {
            return ({ size = 24, color = "currentColor", className = "", ...props }) => {
                const iconData = window.lucide && (window.lucide.icons[name] || window.lucide[name]);
                if (!iconData) return null;

                const renderNode = (node, i) => {
                    const [tag, attrs, children] = node;
                    const reactAttrs = { key: i };
                    if (attrs) {
                        for (const [k, v] of Object.entries(attrs)) {
                            let reactKey = k.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                            if (k === 'class') reactKey = 'className';
                            reactAttrs[reactKey] = v;
                        }
                    }
                    return React.createElement(tag, reactAttrs, (children || []).map((child, j) => renderNode(child, j)));
                };

                const childrenNodes = (Array.isArray(iconData) && typeof iconData[0] === 'string')
                    ? (iconData[0] === 'svg' ? iconData[2] : [iconData]) : iconData;

                return React.createElement(
                    "svg",
                    {
                        xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
                        fill: "none", stroke: color, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                        className: `lucide lucide-${name} ${className}`, ...props
                    },
                    (childrenNodes || []).map((child, i) => renderNode(child, i))
                );
            };
        };
